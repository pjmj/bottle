name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Go (test + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Vet
        run: go vet ./...

      # The race detector needs cgo, which is available on the Linux runner
      # (gcc preinstalled) — this is exactly the check we couldn't run on the
      # cgo-less Windows dev box.
      - name: Test (race detector)
        run: go test -race ./...

      - name: Lint
        # v8+ of the action is required for golangci-lint v2 (our .golangci.yml
        # uses `version: "2"`); the older v6 action targets golangci-lint v1.
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  frontend:
    name: Web (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      # tsc -b type-checks; vite build produces the production bundle. A type
      # error or build failure fails the pipeline.
      - name: Build
        run: npm run build
