# golangci-lint v2 configuration.
# The default linters (errcheck, govet, ineffassign, staticcheck, unused) are
# already enabled; we add a couple more and wire up the formatters.
version: "2"

linters:
  enable:
    - misspell # catches typos in comments and strings
  settings:
    errcheck:
      # Writing to stdout/stderr/a terminal can't meaningfully fail and there's
      # nothing useful to do with the error, so don't require checking it.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      # Keep imports of this module in their own group, matching the
      # std / third-party / local ordering used throughout the codebase.
      local-prefixes:
        - github.com/pjmj/bottle
