# Run the whole stack with one command: `docker compose up --build`.
# The single container serves both the API and the web UI at http://localhost:8080.
services:
  bottle:
    build: .
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DB_PATH: /app/data/bottle.db
      STATIC_DIR: /app/web/dist
    volumes:
      # Persist the SQLite database across container restarts.
      - bottle-data:/app/data

volumes:
  bottle-data:
